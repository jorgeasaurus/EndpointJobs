name: Refresh job listings

on:
  schedule:
    - cron: "17 11 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh endpoint jobs
        run: npm run jobs:refresh
        env:
          JOB_PROVIDERS: remotive,arbeitnow,jobicy,remoteok,greenhouse,lever,muse,ashby,workable,amazon,workday,jibe,activate,curated,techmaprss,adzuna,theirstack,serpapi,rapidapi,rapidapilinkedin,aidevboard
          JOB_GREENHOUSE_BOARDS: jamf,automox,tanium,okta,sonyinteractiveentertainmentglobal,verkada,anthropic,doordashusa,commvault,kaseya,kymeratherapeutics,databricks,zscaler,samsara,scaleai,wizinc,stripe,spacex,robinhood,boxinc,datadog,elastic,lyft,instacart,andurilindustries,asana,mongodb,brex,figma,airbnb,discord,reddit,rubrik,dropbox,affirm,duolingo,gitlab,coinbase,canonical,pinterest,block,roblox,huntress,keepersecurity,truveta,intercom,amplitude,ubiquiti
          JOB_LEVER_COMPANIES: jumpcloud,brightonjones,hermeus,omnidian
          JOB_ASHBY_BOARDS: docker,cursor,perplexity,openai,cohere,elevenlabs,watershed
          JOB_WORKABLE_ACCOUNTS: ${{ vars.JOB_WORKABLE_ACCOUNTS }}
          JOB_AMAZON_QUERIES: macOS Client Engineering,systems engineer macOS,client engineering,endpoint engineer,intune engineer,end user computer
          JOB_WORKDAY_SITES: Accenture|https://accenture.wd103.myworkdayjobs.com/wday/cxs/accenture/AccentureCareers/jobs|Intune Engineer;Endpoint Engineer;Client Engineering;End User Computer;Workplace Engineer;;Goodwin|https://goodwinprocter.wd5.myworkdayjobs.com/wday/cxs/goodwinprocter/External_Careers/jobs|Manager Desktop Engineering;Desktop Engineering;Endpoint Engineer;;GDIT|https://gdit.wd5.myworkdayjobs.com/wday/cxs/gdit/External_Career_Site/jobs|Endpoint Engineer;Endpoint;Intune;Desktop Engineer;;UT Austin|https://utaustin.wd1.myworkdayjobs.com/wday/cxs/utaustin/UTstaff/jobs|Senior Endpoint Engineer;Endpoint Engineer;Intune;;Blue Origin|https://blueorigin.wd5.myworkdayjobs.com/wday/cxs/blueorigin/BlueOrigin/jobs|Endpoint Experience Administrator;Endpoint Experience;Intune;;Dexcom|https://dexcom.wd1.myworkdayjobs.com/wday/cxs/dexcom/Dexcom/jobs|Sr Staff Desktop Systems Engineer;Desktop Systems Engineer;Endpoint Engineer;;Leidos|https://leidos.wd5.myworkdayjobs.com/wday/cxs/leidos/External/jobs|End-Point Protection Engineer;Endpoint Protection Engineer;Endpoint Engineer;Unified Endpoint Management;;Booz Allen|https://bah.wd1.myworkdayjobs.com/wday/cxs/bah/BAH_Jobs/jobs|Endpoint;Desktop;Client Engineering;End User Computing;Intune;Jamf;Mac;SCCM;;HP|https://hp.wd5.myworkdayjobs.com/wday/cxs/hp/ExternalCareerSite/jobs|Endpoint Agent;Endpoint Privilege Management;Endpoint;Desktop;Intune;SCCM;;NVIDIA|https://nvidia.wd5.myworkdayjobs.com/wday/cxs/nvidia/NVIDIAExternalCareerSite/jobs|Client Platform;Client Platform Architect;Endpoint;Desktop;End User Computing;Jamf;Mac;;Adobe|https://adobe.wd5.myworkdayjobs.com/wday/cxs/adobe/external_experienced/jobs|Digital Employee Experience;Endpoint;Desktop;End User Computing;Intune;Client Engineering;;F5|https://ffive.wd5.myworkdayjobs.com/wday/cxs/ffive/f5jobs/jobs|Senior MDM Engineer;Systems and Platform Administrator;;Allstate|https://allstate.wd5.myworkdayjobs.com/wday/cxs/allstate/Allstate_Careers/jobs|Exposure Intelligence Analyst Endpoint Identity;;Gartner|https://gartner.wd5.myworkdayjobs.com/wday/cxs/gartner/EXT/jobs|Windows Endpoint;;Nordic Consulting|https://nordic.wd1.myworkdayjobs.com/wday/cxs/nordic/Nordic/jobs|MDM Engineer III;;SHI|https://shi.wd12.myworkdayjobs.com/wday/cxs/shi/shicareers/jobs|endpoint Security;;Circle|https://circle.wd1.myworkdayjobs.com/wday/cxs/circle/Circle/jobs|Senior Manager Endpoint Trusted Environments;;Jabil|https://jabil.wd5.myworkdayjobs.com/wday/cxs/jabil/Jabil_Careers/jobs|Endpoint;Endpoints;Endpoint Security;Intune;SCCM;Desktop;;Vanguard|https://vanguard.wd5.myworkdayjobs.com/wday/cxs/vanguard/vanguard_external/jobs|Windows Endpoint;Intune;Jamf;SCCM;Desktop Engineer;End User Computing;;CACI|https://caci.wd1.myworkdayjobs.com/wday/cxs/caci/External/jobs|Endpoint Systems;Endpoint Engineer;Intune;MECM;SCCM;Windows Endpoint;macOS;;KBR|https://kbr.wd5.myworkdayjobs.com/wday/cxs/kbr/KBR_Careers/jobs|End User Compute Engineer;End User Compute;Windows Endpoint;SCCM;Desktop Engineer;End User Computing;;The Hartford|https://thehartford.wd5.myworkdayjobs.com/wday/cxs/thehartford/Careers_External/jobs|End User Engineering;Intune;Windows Endpoint;EUC;SCCM;;RBC|https://rbc.wd3.myworkdayjobs.com/wday/cxs/rbc/RBCGLOBAL1/jobs|Endpoint Security;Mobile Device Management;Intune;Jamf;SCCM;Windows Endpoint;;Autodesk|https://autodesk.wd1.myworkdayjobs.com/wday/cxs/autodesk/Ext/jobs|Digital Workplace Services Specialist;Digital Workplace;Jamf;End User Computing;;Capital One|https://capitalone.wd12.myworkdayjobs.com/wday/cxs/capitalone/Capital_One/jobs|Endpoint Security;Endpoint;Intune;Jamf;Desktop;Digital Workplace;;Thermo Fisher|https://thermofisher.wd5.myworkdayjobs.com/wday/cxs/thermofisher/ThermoFisherCareers/jobs|Endpoint Services;Endpoint;Desktop;Intune;SCCM;End User Computing
          JOB_JIBE_SITES: mcgraw-hill|https://careers.mheducation.com/api/jobs|Endpoint Engineering Lead;Endpoint Engineer;Jamf;Intune
          JOB_ACTIVATE_SITES: cardinal-health|https://jobs.cardinalhealth.com/search/searchresultslist|Senior Engineer, IT Client Services;IT Client Services;Endpoint
          JOB_TECHMAP_RSS_FEEDS: ${{ secrets.JOB_TECHMAP_RSS_FEEDS }}
          JOB_TECHMAP_RSS_AUTH_HEADER: ${{ secrets.JOB_TECHMAP_RSS_AUTH_HEADER }}
          TECHMAP_RSS_TOKEN: ${{ secrets.TECHMAP_RSS_TOKEN }}
          JOB_MUSE_PAGES: "5"
          JOB_ADZUNA_COUNTRIES: us,ch
          THEIRSTACK_API_KEY: ${{ secrets.THEIRSTACK_API_KEY }}
          JOB_THEIRSTACK_MAX_AGE_DAYS: "30"
          JOB_THEIRSTACK_LIMIT: "25"
          JOB_THEIRSTACK_COUNTRY_CODES: US,CH
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          JOB_SERPAPI_LOCATION: United States
          JOB_SERPAPI_GL: us
          JOB_SERPAPI_HL: en
          JOB_SERPAPI_MAX_PAGES: "1"
          RAPIDAPI_DAILY_JOBS_KEY: ${{ secrets.RAPIDAPI_DAILY_JOBS_KEY }}
          JOB_RAPIDAPI_COUNTRY_CODES: us,ch
          JOB_RAPIDAPI_HAS_SALARY: "true"
          JOB_RAPIDAPI_MAX_PAGES: "1"
          RAPIDAPI_LINKEDIN_JOBS_KEY: ${{ secrets.RAPIDAPI_LINKEDIN_JOBS_KEY }}
          JOB_RAPIDAPI_LINKEDIN_LOCATION_FILTER: '"United States" OR "Switzerland" OR "Remote"'
          JOB_RAPIDAPI_LINKEDIN_MAX_PAGES: "1"
          JOB_RAPIDAPI_LINKEDIN_LIMIT: "25"
          AIDEVBOARD_API_KEY: ${{ secrets.AIDEVBOARD_API_KEY }}
          JOB_AIDEVBOARD_MAX_PAGES: "1"
          JOB_AIDEVBOARD_LIMIT: "20"
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          JOB_FEED_SOURCE_URL: https://github.com/jorgeasaurus/EndpointJobs
          JOB_STALE_DAYS: "45"
          JOB_MAX_RESULTS: "500"
          JOB_EXCLUDED_SOURCE_URLS: ${{ vars.JOB_EXCLUDED_SOURCE_URLS }}

      - name: Verify build
        run: npm run build

      - name: Commit updated listings
        run: |
          if git diff --quiet -- src/data/jobs.json; then
            echo "No listing changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/jobs.json
          git commit -m "Refresh endpoint job listings"
          git restore --worktree --staged .
          git fetch origin "${GITHUB_REF_NAME}"
          git rebase FETCH_HEAD
          git push origin "HEAD:${GITHUB_REF_NAME}"
