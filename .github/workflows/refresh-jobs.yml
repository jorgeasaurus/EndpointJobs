name: Refresh job listings

on:
  schedule:
    - cron: "17 11 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-jobs
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Refresh endpoint jobs
        run: npm run jobs:refresh
        env:
          JOB_PROVIDERS: remotive,arbeitnow,jobicy,remoteok,greenhouse,lever,muse,ashby,workable,amazon,workday,jibe,activate,smartrecruiters,recruitee,schooljobs,curated,techmaprss,adzuna,theirstack,serpapi,rapidapi,rapidapilinkedin,aidevboard
          JOB_WORKABLE_ACCOUNTS: ${{ vars.JOB_WORKABLE_ACCOUNTS }}
          JOB_TECHMAP_RSS_FEEDS: ${{ secrets.JOB_TECHMAP_RSS_FEEDS }}
          JOB_TECHMAP_RSS_AUTH_HEADER: ${{ secrets.JOB_TECHMAP_RSS_AUTH_HEADER }}
          TECHMAP_RSS_TOKEN: ${{ secrets.TECHMAP_RSS_TOKEN }}
          JOB_ADZUNA_COUNTRIES: us,ch,it,es,fr,de
          THEIRSTACK_API_KEY: ${{ secrets.THEIRSTACK_API_KEY }}
          JOB_THEIRSTACK_MAX_AGE_DAYS: "30"
          JOB_THEIRSTACK_LIMIT: "25"
          JOB_THEIRSTACK_COUNTRY_CODES: US,CH,IT,ES,FR,DE
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          JOB_SERPAPI_COUNTRIES: us,au
          JOB_SERPAPI_US_QUERY_LIMIT: "26"
          JOB_SERPAPI_ROTATION_INDEX: ${{ github.run_number }}
          JOB_SERPAPI_AU_QUERIES: endpoint engineer
          JOB_SERPAPI_AU_LOCATIONS: Sydney, New South Wales, Australia|Melbourne, Victoria, Australia
          JOB_SERPAPI_MAX_PAGES: "1"
          JOB_SERPAPI_MAX_SEARCHES_PER_RUN: "28"
          JOB_SERPAPI_MONTHLY_RESERVE: "100"
          JOB_SERPAPI_QUOTA_PREFLIGHT: "true"
          RAPIDAPI_DAILY_JOBS_KEY: ${{ secrets.RAPIDAPI_DAILY_JOBS_KEY }}
          JOB_RAPIDAPI_COUNTRY_CODES: us,ch,it,es,fr,de
          JOB_RAPIDAPI_HAS_SALARY: "true"
          JOB_RAPIDAPI_MAX_PAGES: "1"
          RAPIDAPI_LINKEDIN_JOBS_KEY: ${{ secrets.RAPIDAPI_LINKEDIN_JOBS_KEY }}
          JOB_RAPIDAPI_LINKEDIN_LOCATION_FILTER: '"United States" OR "Switzerland" OR "Italy" OR "Spain" OR "France" OR "Germany" OR "Remote"'
          JOB_RAPIDAPI_LINKEDIN_MAX_PAGES: "1"
          JOB_RAPIDAPI_LINKEDIN_LIMIT: "25"
          AIDEVBOARD_API_KEY: ${{ secrets.AIDEVBOARD_API_KEY }}
          JOB_AIDEVBOARD_MAX_PAGES: "1"
          JOB_AIDEVBOARD_LIMIT: "20"
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          JOB_FEED_SOURCE_URL: https://github.com/jorgeasaurus/EndpointJobs
          JOB_STALE_DAYS: "45"
          JOB_MAX_RESULTS: "1000"
          JOB_EXCLUDED_SOURCE_URLS: ${{ vars.JOB_EXCLUDED_SOURCE_URLS }}

      - name: Verify build
        run: npm run build

      - name: Commit updated listings
        run: |
          if git diff --quiet -- src/data/jobs.json; then
            echo "No listing changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/jobs.json
          git commit -m "Refresh endpoint job listings"
          git restore --worktree --staged .
          git fetch origin "${GITHUB_REF_NAME}"
          git rebase FETCH_HEAD
          git push origin "HEAD:${GITHUB_REF_NAME}"
