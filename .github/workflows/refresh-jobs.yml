name: Refresh job listings

on:
  schedule:
    - cron: "17 11 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh endpoint jobs
        run: npm run jobs:refresh
        env:
          JOB_PROVIDERS: remotive,arbeitnow,jobicy,remoteok,greenhouse,lever,muse,ashby,workable,amazon,workday,jibe,activate,techmaprss,adzuna,theirstack,serpapi,rapidapi
          JOB_GREENHOUSE_BOARDS: jamf,automox,tanium,okta,sonyinteractiveentertainmentglobal,verkada,anthropic,doordashusa,commvault,kaseya,kymeratherapeutics,databricks,zscaler,samsara,scaleai,wizinc,stripe,robinhood,boxinc,datadog,elastic,lyft,instacart
          JOB_LEVER_COMPANIES: jumpcloud,brightonjones,hermeus,omnidian
          JOB_ASHBY_BOARDS: docker,cursor,perplexity,openai,cohere,elevenlabs,watershed
          JOB_WORKABLE_ACCOUNTS: ${{ vars.JOB_WORKABLE_ACCOUNTS }}
          JOB_AMAZON_QUERIES: macOS Client Engineering,systems engineer macOS,client engineering,endpoint engineer,intune engineer,end user computer
          JOB_WORKDAY_SITES: accenture|https://accenture.wd103.myworkdayjobs.com/wday/cxs/accenture/AccentureCareers/jobs|Intune Engineer;Endpoint Engineer;Client Engineering;End User Computer;Workplace Engineer;;goodwin|https://goodwinprocter.wd5.myworkdayjobs.com/wday/cxs/goodwinprocter/External_Careers/jobs|Manager Desktop Engineering;Desktop Engineering;Endpoint Engineer;;gdit|https://gdit.wd5.myworkdayjobs.com/wday/cxs/gdit/External_Career_Site/jobs|Endpoint Engineer;Endpoint;Intune;Desktop Engineer;;ut-austin|https://utaustin.wd1.myworkdayjobs.com/wday/cxs/utaustin/UTstaff/jobs|Senior Endpoint Engineer;Endpoint Engineer;Intune;;blue-origin|https://blueorigin.wd5.myworkdayjobs.com/wday/cxs/blueorigin/BlueOrigin/jobs|Endpoint Experience Administrator;Endpoint Experience;Intune;;dexcom|https://dexcom.wd1.myworkdayjobs.com/wday/cxs/dexcom/Dexcom/jobs|Sr Staff Desktop Systems Engineer;Desktop Systems Engineer;Endpoint Engineer;;leidos|https://leidos.wd5.myworkdayjobs.com/wday/cxs/leidos/External/jobs|End-Point Protection Engineer;Endpoint Protection Engineer;Endpoint Engineer;Unified Endpoint Management
          JOB_JIBE_SITES: mcgraw-hill|https://careers.mheducation.com/api/jobs|Endpoint Engineering Lead;Endpoint Engineer;Jamf;Intune
          JOB_ACTIVATE_SITES: cardinal-health|https://jobs.cardinalhealth.com/search/searchresultslist|Senior Engineer, IT Client Services;IT Client Services;Endpoint
          JOB_TECHMAP_RSS_FEEDS: ${{ secrets.JOB_TECHMAP_RSS_FEEDS }}
          JOB_TECHMAP_RSS_AUTH_HEADER: ${{ secrets.JOB_TECHMAP_RSS_AUTH_HEADER }}
          TECHMAP_RSS_TOKEN: ${{ secrets.TECHMAP_RSS_TOKEN }}
          JOB_MUSE_PAGES: "5"
          JOB_ADZUNA_COUNTRY: us
          JOB_ADZUNA_QUERIES: >-
            endpoint engineer,endpoint administrator,desktop engineer,desktop administrator,desktop systems engineer,systems engineer macos,macos engineer,windows engineer,windows endpoint engineer,client platform engineer,client platform,client infrastructure engineer,client infrastructure,client engineering,end user computing engineer,digital workplace engineer,digital workplace,employee experience engineer,employee experience technology,digital employee experience,corporate engineering,enterprise engineering,device trust engineer,device trust,zero-touch deployment,zero touch deployment,it systems engineer,tech operations engineer,tech operations,technology operations engineer,workplace engineer,intune engineer,jamf engineer,sccm engineer,mdm engineer
          THEIRSTACK_API_KEY: ${{ secrets.THEIRSTACK_API_KEY }}
          JOB_THEIRSTACK_MAX_AGE_DAYS: "30"
          JOB_THEIRSTACK_LIMIT: "25"
          JOB_THEIRSTACK_COUNTRY_CODES: US
          JOB_THEIRSTACK_COMPANY_NAMES: >-
            Kandji,Fleet,NinjaOne,Addigy,Mosyle,CrowdStrike,SentinelOne,Palo Alto Networks,1Password,Bitwarden,BeyondTrust,Apple,Microsoft,Adobe,Salesforce,ServiceNow,Block,Capital One,Bloomberg,Netflix
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          JOB_SERPAPI_LOCATION: United States
          JOB_SERPAPI_GL: us
          JOB_SERPAPI_HL: en
          JOB_SERPAPI_MAX_PAGES: "1"
          JOB_SERPAPI_QUERIES: >-
            endpoint engineer,endpoint administrator,desktop engineer,desktop administrator,desktop systems engineer,systems engineer macos,macos engineer,windows engineer,windows endpoint engineer,client platform engineer,client platform,client infrastructure engineer,client infrastructure,client engineering,end user computing engineer,digital workplace engineer,digital workplace,employee experience engineer,employee experience technology,digital employee experience,corporate engineering,enterprise engineering,device trust engineer,device trust,zero-touch deployment,zero touch deployment,it systems engineer,tech operations engineer,tech operations,technology operations engineer,workplace engineer,intune engineer,jamf engineer,sccm engineer,mdm engineer,Kandji endpoint engineer,Fleet endpoint engineer,NinjaOne endpoint engineer,Addigy endpoint engineer,Mosyle endpoint engineer,CrowdStrike endpoint engineer,SentinelOne endpoint engineer,Palo Alto Networks endpoint engineer,1Password endpoint engineer,Bitwarden endpoint engineer,BeyondTrust endpoint engineer,Apple endpoint engineer,Microsoft endpoint engineer,Adobe endpoint engineer,Salesforce endpoint engineer,ServiceNow endpoint engineer,Block endpoint engineer,Capital One endpoint engineer,Bloomberg endpoint engineer,Netflix endpoint engineer
          RAPIDAPI_DAILY_JOBS_KEY: ${{ secrets.RAPIDAPI_DAILY_JOBS_KEY }}
          JOB_RAPIDAPI_COUNTRY_CODE: us
          JOB_RAPIDAPI_HAS_SALARY: "true"
          JOB_RAPIDAPI_MAX_PAGES: "1"
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          JOB_FEED_SOURCE_URL: https://github.com/jorgeasaurus/EndpointJobs
          JOB_STALE_DAYS: "45"
          JOB_MAX_RESULTS: "80"

      - name: Verify build
        run: npm run build

      - name: Commit updated listings
        run: |
          if git diff --quiet -- src/data/jobs.json; then
            echo "No listing changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/jobs.json
          git commit -m "Refresh endpoint job listings"
          git push
