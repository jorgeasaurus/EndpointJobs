name: Refresh job listings

on:
  schedule:
    - cron: "17 11 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh endpoint jobs
        run: npm run jobs:refresh
        env:
          JOB_PROVIDERS: remotive,arbeitnow,jobicy,remoteok,greenhouse,lever,muse,adzuna
          JOB_GREENHOUSE_BOARDS: jamf,automox,tanium,okta
          JOB_LEVER_COMPANIES: jumpcloud
          JOB_MUSE_PAGES: "5"
          JOB_ADZUNA_COUNTRY: us
          JOB_ADZUNA_QUERIES: endpoint engineer,desktop engineer,macos engineer,windows engineer,workplace engineer,device management,intune,jamf,sccm,mdm
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          JOB_FEED_SOURCE_URL: https://github.com/jorgeasaurus/EndpointJobs
          JOB_STALE_DAYS: "45"
          JOB_MAX_RESULTS: "80"

      - name: Verify build
        run: npm run build

      - name: Commit updated listings
        run: |
          if git diff --quiet -- src/data/jobs.json; then
            echo "No listing changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/jobs.json
          git commit -m "Refresh endpoint job listings"
          git push
